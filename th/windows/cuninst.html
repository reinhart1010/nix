<h1 id="cuninst">cuninst</h1>

<p>คำสั่งนี้เป็นอีกชื่อหนึ่งของคำสั่ง <code class="language-plaintext highlighter-rouge">choco uninstall</code>
ข้อมูลเพิ่มเติม: <a href="https://docs.chocolatey.org/en-us/choco/commands/uninstall">https://docs.chocolatey.org/en-us/choco/commands/uninstall</a></p>

<ul>
  <li>เรียกดูรายละเอียดสำหรับคำสั่งตัวเต็ม:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">tldr choco uninstall</code></p>
