<h1 id="rm">rm</h1>

<p>移除檔案或目錄。
更多資訊：<a href="https://www.gnu.org/software/coreutils/rm">https://www.gnu.org/software/coreutils/rm</a>.</p>

<ul>
  <li>移除位於指定路徑的檔案：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rm </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">檔案一/完整/路徑</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">檔案二/完整/路徑</span></p>

<ul>
  <li>遞迴移除目錄與其所有子目錄：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rm -r </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目錄/完整/路徑</span></p>

<ul>
  <li>強制移除目錄，且不會跳出任何確認資訊與錯誤訊息：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rm -rf </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目錄/完整/路徑</span></p>

<ul>
  <li>移除檔案，且每次移除都會進行確認：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rm -i </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">檔案一</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">檔案二</span></p>

<ul>
  <li>移除目錄中的所有檔案，並顯示每個檔案的移除資訊：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rm -v </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目錄/完整/路徑/*</span></p>
