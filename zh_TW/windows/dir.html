<h1 id="dir">dir</h1>

<p>列出目錄的內容。
更多資訊：<a href="https://docs.microsoft.com/windows-server/administration/windows-commands/dir">https://docs.microsoft.com/windows-server/administration/windows-commands/dir</a>.</p>

<ul>
  <li>顯示當前目錄的內容：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir</code></p>

<ul>
  <li>顯示指定目錄的內容：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目錄/完整/路徑</span></p>

<ul>
  <li>顯示當前目錄的內容，包括隱藏的文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir /A</code></p>

<ul>
  <li>顯示指定目錄的內容，包括隱藏的文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目錄/完整/路徑</span><code class="language-plaintext highlighter-rouge"> /A</code></p>
