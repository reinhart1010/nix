<h1 id="logcat">logcat</h1>

<p>轉存系統訊息日誌。
更多資訊：<a href="https://developer.android.com/studio/command-line/logcat">https://developer.android.com/studio/command-line/logcat</a>.</p>

<ul>
  <li>顯示系統日誌：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">logcat</code></p>

<ul>
  <li>將系統日誌寫入檔案：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">logcat -f </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件路径</span></p>

<ul>
  <li>顯示與正規表示式匹配的列：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">logcat --regex </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">正規表示式</span></p>
