<h1 id="sleep">sleep</h1>

<p>കാലതാമസം വരുത്തുവാനുള്ള പ്രോഗ്രാം.
കൂടുതൽ വിവരങ്ങൾ: <a href="https://www.gnu.org/software/coreutils/sleep">https://www.gnu.org/software/coreutils/sleep</a>.</p>

<ul>
  <li>നിമിഷങ്ങൾ വൈകിക്കാൻ:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">നിമിഷങ്ങൾ</span></p>

<ul>
  <li>മിനിറ്റുകൾ വൈകിക്കാൻ:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">മിനിറ്റുകൾ</span><code class="language-plaintext highlighter-rouge">m</code></p>

<ul>
  <li>മണിക്കൂറുകൾ വൈകിക്കാൻ:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">മണിക്കൂറുകൾ</span><code class="language-plaintext highlighter-rouge">h</code></p>
