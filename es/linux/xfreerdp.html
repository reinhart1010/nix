<h1 id="xfreerdp">xfreerdp</h1>

<p>Implementación libre del protocolo de escritorio remoto (<em>Remote Desktop Protocol</em>).
Más información: <a href="https://www.freerdp.com">https://www.freerdp.com</a>.</p>

<ul>
  <li>Conecta con un servidor FreeRDP:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">xfreerdp /u:</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">nombre_de_usuario</span><code class="language-plaintext highlighter-rouge"> /p:</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">contraseña</span><code class="language-plaintext highlighter-rouge"> /v:</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">direccion_ip</span></p>
