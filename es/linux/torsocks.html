<h1 id="torsocks">torsocks</h1>

<p>Utiliza cualquier aplicación a través de la red de Tor.
Más información: <a href="https://gitlab.torproject.org/tpo/core/torsocks/">https://gitlab.torproject.org/tpo/core/torsocks/</a>.</p>

<ul>
  <li>Ejecuta un comando usando Tor:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">torsocks </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">comando</span></p>

<ul>
  <li>Activa o desactiva Tor en este intérprete de comandos:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">. torsocks </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">on|off</span></p>
