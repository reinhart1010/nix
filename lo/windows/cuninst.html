<h1 id="cuninst">cuninst</h1>

<p>ຄຳສັ່ງນີ້ເປັນອີກຊື່ໜຶ່ງຂອງຄຳສັ່ງ <code class="language-plaintext highlighter-rouge">choco uninstall</code>.
ຂໍ້ມູນເພີ່ມເຕີມ: <a href="https://docs.chocolatey.org/en-us/choco/commands/uninstall">https://docs.chocolatey.org/en-us/choco/commands/uninstall</a>.</p>

<ul>
  <li>ເປີດເບິ່ງລາຍລະອຽດຄຳສັ່ງແບບເຕັມ:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">tldr choco uninstall</code></p>
