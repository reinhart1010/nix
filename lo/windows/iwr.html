<h1 id="iwr">iwr</h1>

<p>ຄຳສັ່ງນີ້ເປັນອີກຊື່ໜຶ່ງຂອງຄຳສັ່ງ <code class="language-plaintext highlighter-rouge">invoke-webrequest</code>.
ຂໍ້ມູນເພີ່ມເຕີມ: <a href="https://learn.microsoft.com/powershell/module/microsoft.powershell.utility/invoke-webrequest">https://learn.microsoft.com/powershell/module/microsoft.powershell.utility/invoke-webrequest</a>.</p>

<ul>
  <li>ເປີດເບິ່ງລາຍລະອຽດຂອງຄຳສັ່ງແບບເຕັມ:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">tldr invoke-webrequest</code></p>
