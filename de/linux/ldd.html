<h1 id="ldd">ldd</h1>

<p>Zeigt Abhängigkeiten von dynamischen Bibliotheken an.
Weitere Informationen: <a href="https://manned.org/ldd">https://manned.org/ldd</a>.</p>

<ul>
  <li>Zeige Abhängigkeiten von dynamischen Bibliotheken einer Binärdatei an:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">ldd </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">pfad/zu/binärdatei</span></p>

<ul>
  <li>Zeige ungenutzte direkte Abhängigkeiten an:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">ldd -u </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">pfad/zu/binärdatei</span></p>
