<h1 id="winget">winget</h1>

<p>Windows Package Manager CLI.
Weitere Informationen: <a href="https://docs.microsoft.com/windows/package-manager/winget">https://docs.microsoft.com/windows/package-manager/winget</a>.</p>

<ul>
  <li>Installiere ein Paket:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">winget install </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">paket</span></p>

<ul>
  <li>Zeige Informationen über ein Paket an:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">winget show </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">paket</span></p>

<ul>
  <li>Suche ein Paket:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">winget search </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">paket</span></p>
