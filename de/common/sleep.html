<h1 id="sleep">sleep</h1>

<p>Verzögert für einen bestimmten Zeitraum.
Weitere Informationen: <a href="https://www.gnu.org/software/coreutils/sleep">https://www.gnu.org/software/coreutils/sleep</a>.</p>

<ul>
  <li>Verzögere in Sekunden:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">sekunden</span></p>

<ul>
  <li>Verzögere in Minuten:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">minuten</span><code class="language-plaintext highlighter-rouge">m</code></p>

<ul>
  <li>Verzögere in Stunden:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">stunden</span><code class="language-plaintext highlighter-rouge">h</code></p>
