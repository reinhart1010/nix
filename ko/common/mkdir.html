<h1 id="mkdir">mkdir</h1>

<p>디렉토리를 생성하고 해당 권한을 설정합니다.
더 많은 정보: <a href="https://www.gnu.org/software/coreutils/mkdir">https://www.gnu.org/software/coreutils/mkdir</a>.</p>

<ul>
  <li>특정 디렉토리 생성:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">경로/대상/폴더1 경로/대상/폴더2 …</span></p>

<ul>
  <li>필요시 특정 디렉토리와 그 [상위] 디렉토리를 생성:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkdir -p </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">경로/대상/폴더1 경로/대상/폴더2 …</span></p>

<ul>
  <li>특정 권한으로 디렉토리 생성:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkdir -m </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">rwxrw-r–</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">경로/대상/폴더1 경로/대상/폴더2 …</span></p>
