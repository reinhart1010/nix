<h1 id="home-manager">home-manager</h1>

<p>Nix를 이용하여 사용자 환경을 관리.
더 많은 정보: <a href="https://github.com/rycee/home-manager">https://github.com/rycee/home-manager</a>.</p>

<ul>
  <li><code class="language-plaintext highlighter-rouge">~/.config/nixpkgs/home.nix</code>에 정의된 구성을 활성화:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">home-manager build</code></p>

<ul>
  <li>구성을 활성화하고 해당 구성으로 전환:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">home-manager switch</code></p>
