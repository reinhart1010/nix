<h1 id="az">az</h1>

<p>Microsoft Azure의 공식 CLI tool입니다.
더 많은 정보: <a href="https://docs.microsoft.com/cli/azure">https://docs.microsoft.com/cli/azure</a>.</p>

<ul>
  <li>Azure에 로그인:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">az login</code></p>

<ul>
  <li>Azure 구독 정보 관리:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">az account</code></p>

<ul>
  <li>모든 Azure 관리 디스크 나열:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">az disk list</code></p>

<ul>
  <li>모든 Azure 가상머신 나열:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">az vm list</code></p>

<ul>
  <li>Azure Kubernetes Services 관리:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">az aks</code></p>

<ul>
  <li>Azure 네트워크 리소스 관리:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">az network</code></p>
