<h1 id="bzip2">bzip2</h1>

<p>블록 정렬 파일 압축기.
더 많은 정보: <a href="http://bzip.org">http://bzip.org</a>.</p>

<ul>
  <li>파일 압축하기:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">경로/압축할_파일명</span></p>

<ul>
  <li>파일 압축해제하기:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 -d </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">경로/압축된_.bz2파일</span></p>

<ul>
  <li>파일을 표준 출력으로 압축해제:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 -dc </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">경로/압축된_.bz2파일</span></p>
