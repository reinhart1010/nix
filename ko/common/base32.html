<h1 id="base32">base32</h1>

<p>파일 또는 표준 입력을 Base32와 표준 출력으로 인코딩하거나 디코딩함.
더 많은 정보: <a href="https://www.gnu.org/software/coreutils/base32">https://www.gnu.org/software/coreutils/base32</a>.</p>

<ul>
  <li>파일 인코딩:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">base32 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span></p>

<ul>
  <li>파일 디코딩:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">base32 --decode </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span></p>

<ul>
  <li>stdin에서 인코딩:</li>
</ul>

<p><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">somecommand</span><code class="language-plaintext highlighter-rouge"> | base32</code></p>

<ul>
  <li>stdin에서 디코딩:</li>
</ul>

<p><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">somecommand</span><code class="language-plaintext highlighter-rouge"> | base32 --decode</code></p>
