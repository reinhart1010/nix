<h1 id="cuninst">cuninst</h1>

<p>このコマンドは <code class="language-plaintext highlighter-rouge">choco uninstall</code> のエイリアスです。
詳しくはこちら: <a href="https://docs.chocolatey.org/en-us/choco/commands/uninstall">https://docs.chocolatey.org/en-us/choco/commands/uninstall</a></p>

<ul>
  <li>オリジナルのコマンドのドキュメントを表示する:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">tldr choco uninstall</code></p>
