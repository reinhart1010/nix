<h1 id="dir">dir</h1>

<p>ディレクトリの内容を一覧表示します。
詳しくはこちら: <a href="https://docs.microsoft.com/windows-server/administration/windows-commands/dir">https://docs.microsoft.com/windows-server/administration/windows-commands/dir</a></p>

<ul>
  <li>現在のディレクトリの内容を表示します:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir</code></p>

<ul>
  <li>特定のディレクトリの内容を表示します:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">ディレクトリパス</span></p>

<ul>
  <li>非表示の内容を含む、現在のディレクトリの内容を表示します:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir /A</code></p>

<ul>
  <li>非表示の内容を含む、特定のディレクトリの内容を表示します:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">ディレクトリパス</span><code class="language-plaintext highlighter-rouge"> /A</code></p>
