<h1 id="cron">cron</h1>

<p>Dit commando is een alias van <code class="language-plaintext highlighter-rouge">crontab</code>.
Het commando om entries toe te voegen, aan te passen of te verwijderen in <code class="language-plaintext highlighter-rouge">cron</code> is called <code class="language-plaintext highlighter-rouge">crontab</code>.</p>

<ul>
  <li>Bekijk de documentatie van het originele commando:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">tldr crontab</code></p>
