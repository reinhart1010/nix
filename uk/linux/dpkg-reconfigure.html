<h1 id="dpkg-reconfigure">dpkg-reconfigure</h1>

<p>Змінює конфігурацію вже встановленого пакету.
Більше інформації: <a href="https://manpages.debian.org/latest/debconf/dpkg-reconfigure.8.html">https://manpages.debian.org/latest/debconf/dpkg-reconfigure.8.html</a>.</p>

<ul>
  <li>Змінити конфігурацію одного або декількох пакетів:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dpkg-reconfigure </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">пакунок1 пакунок2 …</span></p>
