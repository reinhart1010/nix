<h1 id="archlinux-java">archlinux-java</h1>

<p>提供 Java 环境设置功能的一个帮助脚本。
更多信息：<a href="https://github.com/michaellass/archlinux-java-run">https://github.com/michaellass/archlinux-java-run</a>.</p>

<ul>
  <li>列出已安装的 Java 环境：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">archlinux-java status</code></p>

<ul>
  <li>设置默认的 Java 环境：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">archlinux-java set </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">java_environment</span></p>

<ul>
  <li>取消默认的 Java 环境：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">archlinux-java unset</code></p>

<ul>
  <li>自动设置默认的 Java 环境：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">archlinux-java fix</code></p>
