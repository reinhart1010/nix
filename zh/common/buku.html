<h1 id="buku">buku</h1>

<p>命令行版本的书签管理器。
更多信息：<a href="https://github.com/jarun/Buku">https://github.com/jarun/Buku</a>.</p>

<ul>
  <li>根据关键词和标签查找书签：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">buku </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">关键字</span><code class="language-plaintext highlighter-rouge"> --stag </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">标签</span></p>

<ul>
  <li>添加书签，并且打上标签：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">buku --add </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">https://example.com</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">搜索引擎</span><code class="language-plaintext highlighter-rouge">, </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">标签</span></p>

<ul>
  <li>删除一个书签：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">buku --delete "</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">书签 id</span><code class="language-plaintext highlighter-rouge">"</code></p>

<ul>
  <li>打开编辑器，修改书签：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">buku --write "</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">书签 id</span><code class="language-plaintext highlighter-rouge">"</code></p>

<ul>
  <li>将指定标签移除：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">buku --update "</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">书签 id</span><code class="language-plaintext highlighter-rouge">" --tag </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">-</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">搜索引擎</span></p>
