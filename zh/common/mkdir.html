<h1 id="mkdir">mkdir</h1>

<p>创建目录。
更多信息：<a href="https://www.gnu.org/software/coreutils/mkdir">https://www.gnu.org/software/coreutils/mkdir</a>.</p>

<ul>
  <li>在当前目录下创建多个目录：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">路径/到/目录1 路径/到/目录2 …</span></p>

<ul>
  <li>递归地创建目录（对创建嵌套目录很有用）：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkdir -p </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">路径/到/目录1 路径/到/目录2 …</span></p>
