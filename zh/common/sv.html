<h1 id="sv">sv</h1>

<p>控制正在运行的服务。
更多信息：<a href="https://manned.org/sv.8">https://manned.org/sv.8</a>.</p>

<ul>
  <li>启动服务：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo sv up </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目标目录 / 服务文件</span></p>

<ul>
  <li>停止服务：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo sv down </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目标目录 / 服务文件</span></p>

<ul>
  <li>获取服务状态：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo sv status </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目标目录 / 服务文件</span></p>
