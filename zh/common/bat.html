<h1 id="bat">bat</h1>

<p>可以打印并且合并文件的命令。
<code class="language-plaintext highlighter-rouge">cat</code> 的复制品，外加语法高亮和 Git 集成。
更多信息：<a href="https://github.com/sharkdp/bat">https://github.com/sharkdp/bat</a>.</p>

<ul>
  <li>文件内容打印：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bat </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件</span></p>

<ul>
  <li>多文件合并到目标文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bat </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件1</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件2</span><code class="language-plaintext highlighter-rouge"> &gt; </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目标文件</span></p>

<ul>
  <li>在指定文件后追加多个文件合并的内容：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bat </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件1</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件2</span><code class="language-plaintext highlighter-rouge"> &gt;&gt; </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目标文件</span></p>

<ul>
  <li>打印时，显示行号：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bat -n </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件</span></p>

<ul>
  <li>高亮一个 <code class="language-plaintext highlighter-rouge">json</code> 文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bat --language json </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件.json</span></p>

<ul>
  <li>受支持的语言清单：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bat --list-languages</code></p>
