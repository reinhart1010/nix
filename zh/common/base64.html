<h1 id="base64">base64</h1>

<p>将文件或标准输入编码到 Base64 或从 Base64 解码为标准输出。
更多信息：<a href="https://www.gnu.org/software/coreutils/base64">https://www.gnu.org/software/coreutils/base64</a>.</p>

<ul>
  <li>编码一个文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">base64 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名</span></p>

<ul>
  <li>解码一个文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">base64 --decode </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名</span></p>

<ul>
  <li>从标准输入编码：</li>
</ul>

<p><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">某指令</span><code class="language-plaintext highlighter-rouge"> | base64</code></p>

<ul>
  <li>将标准输入解码：</li>
</ul>

<p><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">某指令</span><code class="language-plaintext highlighter-rouge"> | base64 --decode</code></p>
