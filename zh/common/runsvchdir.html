<h1 id="runsvchdir">runsvchdir</h1>

<p>更改默认使用的 <code class="language-plaintext highlighter-rouge">runsvdir</code> 目录。
更多信息：<a href="https://manpages.ubuntu.com/manpages/latest/man8/runsvchdir.8.html">https://manpages.ubuntu.com/manpages/latest/man8/runsvchdir.8.html</a>.</p>

<ul>
  <li>切换 <code class="language-plaintext highlighter-rouge">runsvdir</code> 目录：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo runsvchdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">指定 / 目录</span></p>
