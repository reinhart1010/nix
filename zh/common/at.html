<h1 id="at">at</h1>

<p>在一段时间后，执行单次命令。
atd 服务（或 atrun）需要处于运行状态，以保证命令成功执行。
更多信息：<a href="https://manned.org/at">https://manned.org/at</a>.</p>

<ul>
  <li>5 分钟后，执行标准输入中的命令（命令输入完成后按 <code class="language-plaintext highlighter-rouge">Ctrl + D</code>）：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">at now + </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">5 minutes</span></p>

<ul>
  <li>在今天上午 10:00 执行标准输入中的命令：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">echo "</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">./make_db_backup.sh</span><code class="language-plaintext highlighter-rouge">" | at </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">1000</span></p>

<ul>
  <li>下周二晚上 9:30 执行指定文件中包含的命令：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">at -f </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/file</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">9:30 PM Tue</span></p>
