<h1 id="zsh">zsh</h1>

<p>Z SHell.
与 <code class="language-plaintext highlighter-rouge">bash</code> 和 <code class="language-plaintext highlighter-rouge">sh</code> 兼容的命令行解释器。
更多信息：<a href="https://www.zsh.org">https://www.zsh.org</a>.</p>

<ul>
  <li>启动交互式解释器：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">zsh</code></p>

<ul>
  <li>执行从参数传入的命令：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">zsh -c </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">command</span></p>

<ul>
  <li>从文件执行命令（脚本）：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">zsh </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file</span></p>

<ul>
  <li>从文件执行命令并将执行过的命令打印到终端：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">zsh -x </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file</span></p>
