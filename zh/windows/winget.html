<h1 id="winget">winget</h1>

<p>Windows 软件包管理器命令行工具。
更多信息：<a href="https://docs.microsoft.com/windows/package-manager/winget">https://docs.microsoft.com/windows/package-manager/winget</a>.</p>

<ul>
  <li>安装一个软件包：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">winget install </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">package</span></p>

<ul>
  <li>显示关于一个软件包的信息：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">winget show </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">package</span></p>

<ul>
  <li>查找一个软件包：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">winget search </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">package</span></p>
