<h1 id="rmdir">rmdir</h1>

<p>删除一个目录和其中的内容。
更多信息：<a href="https://docs.microsoft.com/windows-server/administration/windows-commands/rmdir">https://docs.microsoft.com/windows-server/administration/windows-commands/rmdir</a>.</p>

<ul>
  <li>删除一个空目录：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rmdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目录的路径</span></p>

<ul>
  <li>递归删除一个目录及其中的内容：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rmdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目录的路径</span><code class="language-plaintext highlighter-rouge"> /s</code></p>

<ul>
  <li>在没有提示的情况下递归删除目录及其内容：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rmdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/directory</span><code class="language-plaintext highlighter-rouge"> /s /q</code></p>
