<h1 id="reg">reg</h1>

<p>用于在 Windows 注册表中管理键及其值的命令行界面。
此命令也有关于其子命令的文件，例如：<code class="language-plaintext highlighter-rouge">reg add</code>.
更多信息：<a href="https://docs.microsoft.com/windows-server/administration/windows-commands/reg">https://docs.microsoft.com/windows-server/administration/windows-commands/reg</a>.</p>

<ul>
  <li>执行注册表命令：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">reg </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">命令</span></p>

<ul>
  <li>显示常规信息并列出所有可用命令：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">reg /?</code></p>

<ul>
  <li>显示指定命令的帮助信息：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">reg </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">命令</span><code class="language-plaintext highlighter-rouge"> /?</code></p>
