<h1 id="dir">dir</h1>

<p>列出目录的内容。
更多信息：<a href="https://docs.microsoft.com/windows-server/administration/windows-commands/dir">https://docs.microsoft.com/windows-server/administration/windows-commands/dir</a>.</p>

<ul>
  <li>显示当前目录的内容：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir</code></p>

<ul>
  <li>显示指定目录的内容：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目录的路径</span></p>

<ul>
  <li>显示当前目录的内容，包括隐藏的文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir /A</code></p>

<ul>
  <li>显示指定目录的内容，包括隐藏的文件：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">目录的路径</span><code class="language-plaintext highlighter-rouge"> /A</code></p>
