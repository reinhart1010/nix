<h1 id="head">head</h1>

<p>输出文件的开头部分。
更多信息：<a href="https://ss64.com/osx/head.html">https://ss64.com/osx/head.html</a>.</p>

<ul>
  <li>输出文件的前几行：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">head -n </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">行数</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名</span></p>

<ul>
  <li>输出文件的前几个字节：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">head -c </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">字节数</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名</span></p>
