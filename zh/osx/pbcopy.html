<h1 id="pbcopy">pbcopy</h1>

<p>将标准输出放入剪贴板（命令行里的 cmd + C）。
更多信息：<a href="https://ss64.com/osx/pbcopy.html">https://ss64.com/osx/pbcopy.html</a>.</p>

<ul>
  <li>将文件的内容放入剪贴板：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">pbcopy &lt; </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件</span></p>

<ul>
  <li>将命令的执行结果放入剪贴板：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">find . -type t -name "*.png" | pbcopy</code></p>
