<h1 id="softwareupdate">softwareupdate</h1>

<p>通过命令行更新 macOS 应用商店中应用程序的工具。
更多信息：<a href="https://ss64.com/osx/softwareupdate.html">https://ss64.com/osx/softwareupdate.html</a>.</p>

<ul>
  <li>列出所有可用的更新：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">softwareupdate -l</code></p>

<ul>
  <li>下载并安装所有更新：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">softwareupdate -ia</code></p>

<ul>
  <li>下载并安装所有推荐的更新：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">softwareupdate -ir</code></p>

<ul>
  <li>下载并安装特定的应用程序：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">softwareupdate -i </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">更新应用程序名</span></p>
