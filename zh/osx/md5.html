<h1 id="md5">md5</h1>

<p>计算 MD5 加密和校验。
更多信息：<a href="https://ss64.com/osx/md5.html">https://ss64.com/osx/md5.html</a>.</p>

<ul>
  <li>计算一个文件的 MD5 校验值：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">md5 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名</span></p>

<ul>
  <li>计算多个文件的 MD5 校验值：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">md5 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名 1</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名 2</span></p>

<ul>
  <li>仅输出 MD5 校验值（无文件名）：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">md5 -q </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">文件名</span></p>

<ul>
  <li>打印给定字符串的 MD5 校验值：</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">md5 -s </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">字符串</span></p>
