<h1 id="rmdir">rmdir</h1>

<p>அடைவை அழி.
மேலும் விவரத்திற்கு: <a href="https://www.gnu.org/software/coreutils/rmdir">https://www.gnu.org/software/coreutils/rmdir</a>.</p>

<ul>
  <li>அடைவு வெறுமையாகயிருந்தால் அதனை அழி. உள்ளடக்கமுடைய அடைவை நீக்க <code class="language-plaintext highlighter-rouge">rm</code> யைப் பயன்படுத்தவும்:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rmdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">அடைவிற்குப்/பாதை</span></p>

<ul>
  <li>அடைவுகளை தற்சுருளாக அழி (உட்பொதிவான அடைவுகளை அழிக்கப் பயன்படும்):</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rmdir -p </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">அடைவிற்குப்/பாதை</span></p>
