<h1 id="cd">cd</h1>

<p>Mudar o diretório atual.
Mais informações: <a href="https://manned.org/cd">https://manned.org/cd</a>.</p>

<ul>
  <li>Ir para um dado diretório:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">caminho/para/diretorio</span></p>

<ul>
  <li>Ir para o diretório base do utilizador atual:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd</code></p>

<ul>
  <li>Ir para o diretório pai do diretório atual:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd ..</code></p>

<ul>
  <li>Ir para o diretório anteriormente escolhido:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd -</code></p>
