<h1 id="sleep">sleep</h1>

Mer information: <a href="https://www.gnu.org/software/coreutils/sleep">https://www.gnu.org/software/coreutils/sleep</a>.</p>

<ul>
  <li>Fördröj i sekunder:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">sekunder</span></p>

  <li>Fördröj i minuter:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">minuter</span><code class="language-plaintext highlighter-rouge">m</code></p>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">timmar</span><code class="language-plaintext highlighter-rouge">h</code></p>
