<h1 id="cd">cd</h1>

<p>Byt nuvarande katalog.
Mer information: <a href="https://manned.org/cd">https://manned.org/cd</a>.</p>

<ul>
  <li>Gå till en given katalog:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">sökväg/till/katalog</span></p>

<ul>
  <li>Gå till hemkatalog för nuvarande användare:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd</code></p>

<ul>
  <li>Gå till överordnad katalog:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd ..</code></p>

<ul>
  <li>Gå tillbaks till den föregående valda katalogen:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cd -</code></p>
