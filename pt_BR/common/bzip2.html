<h1 id="bzip2">bzip2</h1>

<p>Um compressor de arquivos que utiliza o algoritmo Burrows–Wheeler.
Mais informações: <a href="http://bzip.org">http://bzip.org</a>.</p>

<ul>
  <li>Compactar um arquivo:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">arquivo</span></p>

<ul>
  <li>Descompactar um arquivo:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 -d </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">arquivo.bz2</span></p>

<ul>
  <li>Descompactar um arquivo exibindo o conteúdo no terminal:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 -dc </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">arquivo.bz2</span></p>
