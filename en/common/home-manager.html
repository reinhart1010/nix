<h1 id="home-manager">home-manager</h1>

<p>Manage a user environment using Nix.
More information: <a href="https://github.com/rycee/home-manager">https://github.com/rycee/home-manager</a>.</p>

<ul>
  <li>Activate the configuration defined in <code class="language-plaintext highlighter-rouge">~/.config/nixpkgs/home.nix</code>:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">home-manager build</code></p>

<ul>
  <li>Activate the configuration and switch to it:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">home-manager switch</code></p>
