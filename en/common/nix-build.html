<h1 id="nix-build">nix-build</h1>

<p>Build a Nix expression.
More information: <a href="https://nixos.org/releases/nix/latest/manual#sec-nix-build">https://nixos.org/releases/nix/latest/manual#sec-nix-build</a>.</p>

<ul>
  <li>Build a Nix expression:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">nix-build --attr </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">expression_name</span></p>

<ul>
  <li>Build a sandboxed Nix expression (on non-NixOS):</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">nix-build --attr </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">expression_name</span><code class="language-plaintext highlighter-rouge"> --option sandbox true</code></p>
