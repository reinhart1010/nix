<h1 id="less-than">Less than</h1>

<p>Redirect a file to <code class="language-plaintext highlighter-rouge">stdin</code>.
Achieves the same effect as <code class="language-plaintext highlighter-rouge">cat file.txt |</code>.
More information: <a href="https://gnu.org/software/bash/manual/bash.html#Redirecting-Input">https://gnu.org/software/bash/manual/bash.html#Redirecting-Input</a>.</p>

<ul>
  <li>Redirect a file to <code class="language-plaintext highlighter-rouge">stdin</code>:</li>
</ul>

<p><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">command</span><code class="language-plaintext highlighter-rouge"> &lt; </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/file.txt</span></p>
