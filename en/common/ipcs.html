<h1 id="ipcs">ipcs</h1>

<p>Display information about resources used in IPC (Inter-process Communication).
More information: <a href="https://manned.org/ipcs">https://manned.org/ipcs</a>.</p>

<ul>
  <li>Specific information about the Message Queue which has the ID 32768:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">ipcs -qi 32768</code></p>

<ul>
  <li>General information about all the IPC:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">ipcs -a</code></p>
