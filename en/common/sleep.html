<h1 id="sleep">sleep</h1>

<p>Delay for a specified amount of time.
More information: <a href="https://www.gnu.org/software/coreutils/sleep">https://www.gnu.org/software/coreutils/sleep</a>.</p>

<ul>
  <li>Delay in seconds:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">seconds</span></p>

<ul>
  <li>Delay in minutes:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">minutes</span><code class="language-plaintext highlighter-rouge">m</code></p>

<ul>
  <li>Delay in hours:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sleep </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">hours</span><code class="language-plaintext highlighter-rouge">h</code></p>
