<h1 id="mc">mc</h1>

<p>Midnight Commander, a terminal based file manager.
Navigate the directory structure using the arrow keys, the mouse or by typing the commands into the terminal.
More information: <a href="https://midnight-commander.org">https://midnight-commander.org</a>.</p>

<ul>
  <li>Start <code class="language-plaintext highlighter-rouge">mc</code>:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mc</code></p>

<ul>
  <li>Start <code class="language-plaintext highlighter-rouge">mc</code> in black and white:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mc -b</code></p>
