<h1 id="while">while</h1>

<p>Simple shell loop.
More information: <a href="https://manned.org/while">https://manned.org/while</a>.</p>

<ul>
  <li>Read stdin and perform an action on every line:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">while read line; do echo "$line"; done</code></p>

<ul>
  <li>Execute a command forever once every second:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">while :; do </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">command</span><code class="language-plaintext highlighter-rouge">; sleep 1; done</code></p>
