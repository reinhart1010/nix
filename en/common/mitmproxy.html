<h1 id="mitmproxy">mitmproxy</h1>

<p>An interactive man-in-the-middle HTTP proxy.
More information: <a href="https://mitmproxy.org">https://mitmproxy.org</a>.</p>

<ul>
  <li>Start mitmproxy with default settings:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mitmproxy</code></p>

<ul>
  <li>Start mitmproxy bound to custom address and port:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mitmproxy -b </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">ip_address</span><code class="language-plaintext highlighter-rouge"> -p </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">port</span></p>
