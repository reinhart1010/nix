<h1 id="bzip2">bzip2</h1>

<p>A block-sorting file compressor.
More information: <a href="http://bzip.org">http://bzip.org</a>.</p>

<ul>
  <li>Compress a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/file_to_compress</span></p>

<ul>
  <li>Decompress a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 -d </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/compressed_file.bz2</span></p>

<ul>
  <li>Decompress a file to standard output:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">bzip2 -dc </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/compressed_file.bz2</span></p>
