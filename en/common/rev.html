<h1 id="rev">rev</h1>

<p>Reverse a line of text.
More information: <a href="https://manned.org/rev">https://manned.org/rev</a>.</p>

<ul>
  <li>Reverse the text string "hello":</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">echo "hello" | rev</code></p>

<ul>
  <li>Reverse an entire file and print to <code class="language-plaintext highlighter-rouge">stdout</code>:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">rev </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/file</span></p>
