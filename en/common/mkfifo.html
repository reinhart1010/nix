<h1 id="mkfifo">mkfifo</h1>

<p>Make FIFOs (named pipes).
More information: <a href="https://www.gnu.org/software/coreutils/mkfifo">https://www.gnu.org/software/coreutils/mkfifo</a>.</p>

<ul>
  <li>Create a named pipe at a given path:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkfifo </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/pipe</span></p>
