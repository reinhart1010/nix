<h1 id="arch">arch</h1>

<p>Display the name of the system architecture, or run a command under a different architecture.
See also <code class="language-plaintext highlighter-rouge">uname</code>.
More information: <a href="https://www.unix.com/man-page/osx/1/arch/">https://www.unix.com/man-page/osx/1/arch/</a>.</p>

<ul>
  <li>Display the system’s architecture:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">arch</code></p>

<ul>
  <li>Run a command using x86_64:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">arch -x86_64 "</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">command</span><code class="language-plaintext highlighter-rouge">"</code></p>
