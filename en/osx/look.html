<h1 id="look">look</h1>

<p>Look for lines in sorted file.
More information: <a href="https://manned.org/look">https://manned.org/look</a>.</p>

<ul>
  <li>Look for lines which begins with the given prefix:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">look </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">prefix</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file</span></p>

<ul>
  <li>Look for lines ignoring case:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">look --ignore-case </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">prefix</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file</span></p>
