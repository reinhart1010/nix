<h1 id="securityd">securityd</h1>

<p>This manages security contexts and cryptographic operations.
Works with secd for keychain access.
It should not be invoked manually.
More information: <a href="https://www.unix.com/man-page/osx/1/securityd/">https://www.unix.com/man-page/osx/1/securityd/</a>.</p>

<ul>
  <li>Start the daemon:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">securityd</code></p>
