<h1 id="filecoordinationd">filecoordinationd</h1>

<p>Coordinates access to files by multiple processes (<code class="language-plaintext highlighter-rouge">NSFileCoordinator</code>, <code class="language-plaintext highlighter-rouge">NSFilePresenter</code>).
It should not be invoked manually.
More information: <a href="https://www.unix.com/man-page/osx/8/filecoordinationd/">https://www.unix.com/man-page/osx/8/filecoordinationd/</a>.</p>

<ul>
  <li>Start the daemon:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">filecoordinationd</code></p>
