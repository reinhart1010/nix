<h1 id="head">head</h1>

<p>Output the first part of files.
More information: <a href="https://ss64.com/osx/head.html">https://ss64.com/osx/head.html</a>.</p>

<ul>
  <li>Output the first few lines of a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">head -n </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">count_of_lines</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span></p>

<ul>
  <li>Output the first few bytes of a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">head -c </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">number_in_bytes</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span></p>
