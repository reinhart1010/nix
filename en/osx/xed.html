<h1 id="xed">xed</h1>

<p>Opens files for editing in Xcode.
More information: <a href="https://www.manpagez.com/man/1/xed/">https://www.manpagez.com/man/1/xed/</a>.</p>

<ul>
  <li>Open file in Xcode:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">xed </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file1</span></p>

<ul>
  <li>Open file(s) in Xcode, create if it doesn’t exist:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">xed --create </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename1</span></p>

<ul>
  <li>Open a file in Xcode and jump to line number 75:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">xed --line 75 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span></p>
