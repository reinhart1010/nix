<h1 id="cfprefsd">cfprefsd</h1>

<p>Provides preferences services (<code class="language-plaintext highlighter-rouge">CFPreferences</code>, <code class="language-plaintext highlighter-rouge">NSUserDefaults</code>).
It should not be invoked manually.
More information: <a href="https://www.unix.com/man-page/osx/8/cfprefsd/">https://www.unix.com/man-page/osx/8/cfprefsd/</a>.</p>

<ul>
  <li>Start the daemon:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">cfprefsd</code></p>
