<h1 id="secd">secd</h1>

<p>Controls access to and modification of keychain items.
It should not be invoked manually.
More information: <a href="https://www.unix.com/man-page/mojave/8/secd">https://www.unix.com/man-page/mojave/8/secd</a>.</p>

<ul>
  <li>Start the daemon:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">secd</code></p>
