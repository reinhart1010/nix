<h1 id="reboot">reboot</h1>

<p>Reboot the system.
More information: <a href="https://ss64.com/osx/reboot.html">https://ss64.com/osx/reboot.html</a>.</p>

<ul>
  <li>Reboot immediately:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo reboot</code></p>

<ul>
  <li>Reboot immediately without gracefully shutting down:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo reboot -q</code></p>
