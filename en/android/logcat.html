<h1 id="logcat">logcat</h1>

<p>Dump a log of system messages.
More information: <a href="https://developer.android.com/studio/command-line/logcat">https://developer.android.com/studio/command-line/logcat</a>.</p>

<ul>
  <li>Display system logs:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">logcat</code></p>

<ul>
  <li>Write system logs to a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">logcat -f </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/file</span></p>

<ul>
  <li>Display lines that match a regular expression:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">logcat --regex </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">regular_expression</span></p>
