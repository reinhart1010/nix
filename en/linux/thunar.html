<h1 id="thunar">thunar</h1>

<p>Graphical file manager for XFCE desktop environments.
More information: <a href="https://docs.xfce.org/xfce/thunar/start">https://docs.xfce.org/xfce/thunar/start</a>.</p>

<ul>
  <li>Open a new window showing the current directory:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">thunar</code></p>

<ul>
  <li>Open the bulk rename utility:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">thunar --bulk-rename</code></p>

<ul>
  <li>Close all open thunar windows:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">thunar --quit</code></p>
