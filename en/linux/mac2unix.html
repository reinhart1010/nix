<h1 id="mac2unix">mac2unix</h1>

<p>Change macOS-style line endings to Unix-style.
Replaces CR with LF.
More information: <a href="https://waterlan.home.xs4all.nl/dos2unix.html">https://waterlan.home.xs4all.nl/dos2unix.html</a>.</p>

<ul>
  <li>Change the line endings of a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mac2unix </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span></p>

<ul>
  <li>Create a copy with Unix-style line endings:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mac2unix -n </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">new_filename</span></p>
