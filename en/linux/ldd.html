<h1 id="ldd">ldd</h1>

<p>Display shared library dependencies.
More information: <a href="https://manned.org/ldd">https://manned.org/ldd</a>.</p>

<ul>
  <li>Display shared library dependencies of a binary:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">ldd </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/binary</span></p>

<ul>
  <li>Display unused direct dependencies:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">ldd -u </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/binary</span></p>
