<h1 id="torsocks">torsocks</h1>

<p>Use any application through the Tor network.
More information: <a href="https://gitlab.torproject.org/tpo/core/torsocks/">https://gitlab.torproject.org/tpo/core/torsocks/</a>.</p>

<ul>
  <li>Run a command using Tor:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">torsocks </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">command</span></p>

<ul>
  <li>Enable or disable Tor in this shell:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">. torsocks </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">on|off</span></p>
