<h1 id="qmrestore">qmrestore</h1>

<p>Restore QemuServer vzdump Backups.
More information: <a href="https://pve.proxmox.com/pve-docs/qmrestore.1.html">https://pve.proxmox.com/pve-docs/qmrestore.1.html</a>.</p>

<ul>
  <li>Restore KVM-based virtual machine to local storage:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">qmrestore </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">/var/lib/vz/dump/backup_file.vma.lzo</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">vm_id</span><code class="language-plaintext highlighter-rouge"> --storage </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">local</span></p>
