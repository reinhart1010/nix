<h1 id="diff3">diff3</h1>

<p>Compare three files line by line.
More information: <a href="https://www.gnu.org/software/diffutils/manual/html_node/Invoking-diff3.html">https://www.gnu.org/software/diffutils/manual/html_node/Invoking-diff3.html</a>.</p>

<ul>
  <li>Compare files:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">diff3 </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file1</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file2</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file3</span></p>

<ul>
  <li>Show all changes, outlining conflicts:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">diff3 --show-all </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file1</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file2</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file3</span></p>
