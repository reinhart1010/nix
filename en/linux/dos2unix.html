<h1 id="dos2unix">dos2unix</h1>

<p>Change DOS-style line endings to Unix-style.
Replaces CRLF with LF.
More information: <a href="https://manned.org/dos2unix">https://manned.org/dos2unix</a>.</p>

<ul>
  <li>Change the line endings of a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dos2unix </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span></p>

<ul>
  <li>Create a copy with Unix-style line endings:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">dos2unix -n </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">filename</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">new_filename</span></p>
