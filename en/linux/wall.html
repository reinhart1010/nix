<h1 id="wall">wall</h1>

<p>Write a message on the terminals of users currently logged in.
More information: <a href="https://manned.org/wall">https://manned.org/wall</a>.</p>

<ul>
  <li>Send a message:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">echo "</code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">message</span><code class="language-plaintext highlighter-rouge">" | wall</code></p>

<ul>
  <li>Send a message from a file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">wall </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file</span></p>

<ul>
  <li>Send a message with timeout (default 300):</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">wall -t </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">seconds</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file</span></p>
