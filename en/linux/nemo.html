<h1 id="nemo">nemo</h1>

<p>File manager and graphical shell for Cinnamon.
More information: <a href="https://github.com/linuxmint/nemo">https://github.com/linuxmint/nemo</a>.</p>

<ul>
  <li>Open a new window showing the user’s home directory:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">nemo</code></p>

<ul>
  <li>Open a new window showing the current directory:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">nemo .</code></p>

<ul>
  <li>Close all open nemo windows:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">nemo --quit</code></p>
