<h1 id="distrobox-rm">distrobox-rm</h1>

<p>Delete Distrobox containers.
More information: <a href="https://distrobox.privatedns.org">https://distrobox.privatedns.org</a>.</p>

<ul>
  <li>Remove a distrobox:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">distrobox-rm </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">container_name</span></p>

<ul>
  <li>Remove a distrobox forcefully:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">distrobox-rm </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">container_name</span><code class="language-plaintext highlighter-rouge"> --force</code></p>
