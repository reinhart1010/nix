<h1 id="modinfo">modinfo</h1>

<p>Extract information about a Linux kernel module.
More information: <a href="https://manned.org/modinfo">https://manned.org/modinfo</a>.</p>

<ul>
  <li>List all attributes of a kernel module:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">modinfo </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">kernel_module</span></p>

<ul>
  <li>List the specified attribute only:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">modinfo -F </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">author|description|license|parm|filename</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">kernel_module</span></p>
