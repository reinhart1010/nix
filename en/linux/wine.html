<h1 id="wine">wine</h1>

<p>Run Windows programs on Unix.
More information: <a href="https://wiki.winehq.org/">https://wiki.winehq.org/</a>.</p>

<ul>
  <li>Run <code class="language-plaintext highlighter-rouge">ipconfig.exe</code> program:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">wine </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">ipconfig</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">/all</span></p>

<ul>
  <li>Run <code class="language-plaintext highlighter-rouge">cmd.exe</code> in background:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">wine start </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">cmd</span></p>

<ul>
  <li>Run Windows-like Package Manager:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">wine uninstaller</code></p>

<ul>
  <li>Install MSI packages:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">wine msiexec /i </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">package</span></p>
