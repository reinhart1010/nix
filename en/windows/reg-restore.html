<h1 id="reg-restore">reg restore</h1>

<p>Restore a key and its values from a backup file.
See <code class="language-plaintext highlighter-rouge">reg-save</code> for more information.
More information: <a href="https://docs.microsoft.com/windows-server/administration/windows-commands/reg-restore">https://docs.microsoft.com/windows-server/administration/windows-commands/reg-restore</a>.</p>

<ul>
  <li>Overwrite a specified key with data from a backup file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">reg restore </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">key_name</span><code class="language-plaintext highlighter-rouge"> </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/file</span></p>
