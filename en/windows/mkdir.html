<h1 id="mkdir">mkdir</h1>

<p>Creates a directory.
More information: <a href="https://docs.microsoft.com/windows-server/administration/windows-commands/mkdir">https://docs.microsoft.com/windows-server/administration/windows-commands/mkdir</a>.</p>

<ul>
  <li>Create a directory:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">directory_name</span></p>

<ul>
  <li>Recursively create a nested directory tree:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">mkdir </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">path/to/sub_directory_name</span></p>
