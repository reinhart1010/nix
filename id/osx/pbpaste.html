<h1 id="pbpaste">pbpaste</h1>

<p>Mengirim isi papan klip (clipboard) ke output standar.
Informasi lebih lanjut: <a href="https://ss64.com/osx/pbpaste.html">https://ss64.com/osx/pbpaste.html</a>.</p>

<ul>
  <li>Menulis konten papan klip ke dalam sebuah file:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">pbpaste &gt; </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">file</span></p>

<ul>
  <li>Menggunakan konten papan klip sebagai input bagi sebuah perintah:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">pbpaste | grep foo</code></p>
