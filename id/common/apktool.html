<h1 id="apktool">apktool</h1>

<p>Me-reverse engineer berkas APK.
Informasi lebih lanjut: <a href="https://ibotpeaches.github.io/Apktool/">https://ibotpeaches.github.io/Apktool/</a>.</p>

<ul>
  <li>Dekode berkas APK:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">apktool d </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">berkas.apk</span></p>

<ul>
  <li>Men-build folder menjadi berkas APK:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">apktool b </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">alamat/ke/direktori</span></p>

<ul>
  <li>Menginstal dan menyimpan frameworks:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">apktool if </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">framework.apk</span></p>
