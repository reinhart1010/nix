<h1 id="laravel-zero">laravel-zero</h1>

<p>Pemasang Laravel Zero framework berbasis command-line.
Informasi lebih lanjut: <a href="https://laravel-zero.com">https://laravel-zero.com</a>.</p>

<ul>
  <li>Buat aplikasi Laravel Zero baru:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">laravel-zero new </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">nama</span></p>

<ul>
  <li>Perbarui pemasang ke versi terkini:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">laravel-zero self-update</code></p>

<ul>
  <li>Lis perintah yang tersedia:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">laravel-zero list</code></p>
