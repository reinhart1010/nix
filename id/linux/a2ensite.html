<h1 id="a2ensite">a2ensite</h1>

<p>Izinkan sebuah host maya (virtual host) Apache pada OS berbasis Debian.
Informasi lebih lanjut: <a href="https://manpages.debian.org/latest/apache2/a2ensite.8.en.html">https://manpages.debian.org/latest/apache2/a2ensite.8.en.html</a>.</p>

<ul>
  <li>Izinkan sebuah host maya:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo a2ensite </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">host_maya</span></p>

<ul>
  <li>Jangan tampilkan pesan informatif:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">sudo a2ensite --quiet </code><span class="tldr-var badge badge-pill bg-dark-lm bg-white-dm text-white-lm text-dark-dm font-weight-bold">host_maya</span></p>
