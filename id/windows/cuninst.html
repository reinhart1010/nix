<h1 id="cuninst">cuninst</h1>

<p>Perintah ini merupakan alias dari <code class="language-plaintext highlighter-rouge">choco uninstall</code>.
Informasi lebih lanjut: <a href="https://docs.chocolatey.org/en-us/choco/commands/uninstall">https://docs.chocolatey.org/en-us/choco/commands/uninstall</a>.</p>

<ul>
  <li>Menampilkan dokumentasi untuk perintah asli:</li>
</ul>

<p><code class="language-plaintext highlighter-rouge">tldr choco uninstall</code></p>
